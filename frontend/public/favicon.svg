<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Main purple gradient background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="50%" style="stop-color:#6d28d9"/>
      <stop offset="100%" style="stop-color:#9333ea"/>
    </linearGradient>
    <!-- Subtle inner highlight -->
    <radialGradient id="highlight" cx="35%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </radialGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#4c1d95" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Circular background with gradient -->
  <circle cx="16" cy="16" r="15" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Inner highlight sheen -->
  <circle cx="16" cy="16" r="15" fill="url(#highlight)"/>

  <!-- Subtle inner ring -->
  <circle cx="16" cy="16" r="14.2" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.6"/>

  <!-- SatikFlow "S-flow" icon — matches the logo in the app -->
  <!-- Based on the custom phone/flow path used in the app -->
  <g transform="translate(8, 8)" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- S-curve top arc -->
    <path d="M3 2.5 C3 1.12 4.12 0 5.5 0 C8.76 0 11 2.24 11 5.5 C11 8.5 3 8.5 3 11.5 C3 14.76 5.24 17 8.5 17 C9.8 17 10.9 16.55 11.7 15.8"/>
    <!-- Top dot -->
    <circle cx="3" cy="2.5" r="1.3" fill="white" stroke="none"/>
    <!-- Bottom dot -->
    <circle cx="11.5" cy="15.5" r="1.3" fill="white" stroke="none"/>
  </g>
</svg>